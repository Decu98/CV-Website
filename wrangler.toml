name = "cv-website"
main = "worker.js"
compatibility_date = "2026-05-22"
node_compat = true

# Serverless Static Assets Configuration (Modern Wrangler v3+)
# This maps the public assets folder directly to Cloudflare's Edge Network.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Production Environment Variables & Settings
[vars]
ENVIRONMENT = "production"
SLA_TARGET = "99.99%"
