<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Advanced Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background container with subtle border -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#030307" stroke="#9d4edd" stroke-width="1.5" stroke-opacity="0.8"/>
  
  <!-- Glowing Neon Terminal Prompt >_ -->
  <!-- ">" symbol in neon cyan -->
  <path d="M8 10L14 16L8 22" fill="none" stroke="#0af5ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- "_" cursor in neon purple -->
  <line x1="16" y1="22" x2="24" y2="22" stroke="#9d4edd" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
</svg>
